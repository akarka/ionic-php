<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      Ionic Image
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <h3 *ngIf="images.length == 0" class="ion-padding ion-text-center">Bir resim seçiniz</h3>
  <ion-list>
    <ion-item *ngFor=" let file of images ">
      <ion-thumbnail slot="start">

        <ion-img [src]="file.data"> </ion-img>
      </ion-thumbnail>
      <ion-label class="ion-text-wrap">
        {{file.name}}
      </ion-label>

      <ion-button slot="end" (click)="startUpload(file)" fill="clear">
        <ion-icon slot="icon-only" name="cloud-upload-outline"></ion-icon>
      </ion-button>
      <ion-button slot="end" (click)="deleteImage(file)" fill="clear">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button (click)="selectImage()" expand="full" fill="primary">
      <ion-icon name="camera-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-footer>
